name: OTC GUI Login Smoke Test

on:
  workflow_dispatch:

  schedule:
    - cron: '30 8 * * *'

jobs:

  smoke-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install firefox

      - name: Run Smoke Test
        run: |
          xvfb-run python test.py

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmokeTestReport
          path: |
            report_*.txt
            login_success.png

      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          secure: false

          username: ${{ secrets.OUTLOOK_USER }}
          password: ${{ secrets.OUTLOOK_PASSWORD }}

          subject: Playwright | OTC-GUI | Smoke Test Report

          to: siddharth.panigrahy@deutsche-boerse.com

          from: Playwright

          body: |
            
            The OTC GUI Login Smoke Test execution has completed.

            Please find the attached report and screenshot.

            Regards,
            Playwright Automation

          attachments: |
            report_*.txt
            login_success.png
