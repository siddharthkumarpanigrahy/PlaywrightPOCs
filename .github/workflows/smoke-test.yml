name: OTC GUI Login Smoke Test

on:
  workflow_dispatch

jobs:
  smoke-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Smoke Test
        run: |
          python test.py